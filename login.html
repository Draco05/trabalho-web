<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ReceitaFácil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pagina-centrada">
    <div class="card-estreito">

      <div class="card-titulo">
        <h1>ReceitaFácil</h1>
        <p>Entre na sua conta para buscar receitas</p>
      </div>

      <!-- Mensagem de erro (visível apenas quando há erro) -->
      <!-- <div class="mensagem-erro">Username ou senha incorretos.</div> -->

      <form action="principal.html" method="post">
        <div class="form-grupo">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Seu username"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-grupo">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primario">Entrar</button>
      </form>

      <div class="links-form">
        <a href="cadastro.html">Criar conta</a>
        <a href="redefinir-senha.html">Esqueci minha senha</a>
      </div>

    </div>
  </div>
</body>
</html>
