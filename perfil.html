<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil — ReceitaFácil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pagina-interna">

    <header class="header">
      <a href="principal.html" class="logo">
        <img src="imgs/hat-chef-svgrepo-com.svg" class="logo-icon">
        <span class="logo-name">ReceitaFácil</span>
      </a>
      <nav class="header-nav" aria-label="Navegação principal">
        <a href="principal.html" class="header-link">Início</a>
        <a href="buscar-receita.html" class="header-link">Buscar receita</a>
        <a href="minhas-receitas.html" class="header-link">Minhas receitas</a>
        <a href="login.html" class="btn-sair">Sair</a>
      </nav>
    </header>

    <main class="conteudo">
      <h1 style="text-align: center;">Meu perfil</h1>
      <p style="text-align: center;">Informações da sua conta</p>

      <div class="card" style="max-width: 500px; margin-top: 1.5rem; margin-left: auto; margin-right: auto;">

        <div class="perfil-info">
          <div class="perfil-linha">
            <span class="rotulo">Username</span>
            <span class="valor">Jacquin</span>
          </div>
          <div class="perfil-linha">
            <span class="rotulo">E-mail</span>
            <span class="valor">jacquin@email.com</span>
          </div>
        </div>

        <hr class="divisor" />

        <h3 style="margin-bottom: 1rem; color: var(--erro);">Zona de perigo</h3>

        <button class="btn btn-perigo">
          Remover conta
        </button>
        <p style="font-size: 0.82rem; margin-top: 0.5rem; color: var(--texto-suave);">
          Esta ação é permanente e remove todos os seus dados do sistema.
        </p>

      </div>
    </main>

  </div>


</body>
</html>
