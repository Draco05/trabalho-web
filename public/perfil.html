<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil — ReceitaFácil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pagina-interna">

    <header class="header">
      <a href="principal.html" class="logo">
        <img src="imgs/hat-chef-svgrepo-com.svg" class="logo-icon">
        <span class="logo-name">ReceitaFácil</span>
      </a>
      <nav class="header-nav" aria-label="Navegação principal">
        <a href="principal.html" class="header-link">Início</a>
        <a href="buscar-receita.html" class="header-link">Buscar receita</a>
        <a href="minhas-receitas.html" class="header-link">Minhas receitas</a>
        <button class="btn-sair" id="btn-sair">Sair</button>
      </nav>
    </header>

    <main class="conteudo">
      <h1 style="text-align: center;">Meu perfil</h1>
      <p style="text-align: center;">Informações da sua conta</p>

      <div class="card" style="max-width: 500px; margin-top: 1.5rem; margin-left: auto; margin-right: auto;">

        <div class="perfil-info">
          <div class="perfil-linha">
            <span class="rotulo">Username</span>
            <span class="valor" id="perfil-username">Carregando...</span>
          </div>
          <div class="perfil-linha">
            <span class="rotulo">E-mail</span>
            <span class="valor" id="perfil-email">Carregando...</span>
          </div>
        </div>

        <hr class="divisor" />

        <h3 style="margin-bottom: 1rem; color: var(--erro);">Zona de perigo</h3>

        <button class="btn btn-perigo" id="btn-remover-conta">
          Remover conta
        </button>
        <p style="font-size: 0.82rem; margin-top: 0.5rem; color: var(--texto-suave);">
          Esta ação é permanente e remove todos os seus dados do sistema.
        </p>

      </div>
    </main>

  </div>

  <script>
    // ── Carregar dados do perfil ──────────────────────────────
    async function carregarPerfil() {
      try {
        var resp = await fetch('/api/auth/perfil', { credentials: 'include' });

        if (resp.status === 401) {
          window.location.href = 'login.html';
          return;
        }

        var dados = await resp.json();
        document.getElementById('perfil-username').textContent = dados.username;
        document.getElementById('perfil-email').textContent    = dados.email;
      } catch (err) {
        document.getElementById('perfil-username').textContent = 'Erro ao carregar';
        document.getElementById('perfil-email').textContent    = 'Erro ao carregar';
      }
    }

    // ── Botão Sair ────────────────────────────────────────────
    document.getElementById('btn-sair').addEventListener('click', async function () {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = 'login.html';
    });

    // ── Botão Remover conta ───────────────────────────────────
    document.getElementById('btn-remover-conta').addEventListener('click', async function () {
      var confirmado = confirm(
        'Tem certeza que deseja remover sua conta?\nEsta ação não pode ser desfeita.'
      );
      if (!confirmado) return;

      try {
        var resp = await fetch('/api/auth/conta', {
          method:      'DELETE',
          credentials: 'include',
        });

        if (resp.ok) {
          alert('Conta removida com sucesso.');
          window.location.href = 'login.html';
        } else {
          var dados = await resp.json();
          alert(dados.erro || 'Erro ao remover conta.');
        }
      } catch (err) {
        alert('Não foi possível conectar ao servidor.');
      }
    });

    carregarPerfil();
  </script>
</body>
</html>
